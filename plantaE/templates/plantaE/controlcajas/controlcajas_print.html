<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Constancia de Movimiento</title>

    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .box {
            border: 1px solid #000;
            padding: 15px;
        }

        .row {
            margin-bottom: 8px;
        }

        .label {
            font-weight: bold;
        }

        @media print {
            .no-print {
                display: none;
            }
        }
    </style>
</head>

<body>

<div class="header">
    <h2>CONSTANCIA DE MOVIMIENTO DE CAJAS</h2>
</div>

<div class="box">
    <p><b>Registro:</b> {{ registro.registro }}</p>
    <p><b>Item SAP:</b> {{ registro.itemsapcode }}</p>
    <p><b>Cantidad:</b> {{ registro.cajas }}</p>
    <p><b>Tipo Movimiento:</b> {{ registro.tipomov }}</p>
    <p><b>Fecha:</b> {{ registro.fecha }}</p>
</div>

<hr>

<!-- 🔥 QUIEN ENTREGA (FIJO) -->
<div style="margin-top:20px;">
    <p><b>Entrega:</b> Mynor Estrada</p>
    <p>Encargado de recepción/entrega</p>
</div>

<!-- 🔥 QUIEN RECIBE (INPUT) -->
<div style="margin-top:30px;">
    <label><b>Recibe:</b></label><br>
    <input type="text" id="recibe" placeholder="Nombre de quien recibe"
           style="width:300px; padding:5px;">
</div>

<!-- FIRMA -->
<div style="margin-top:30px;">
    <label><b>Firma:</b></label><br>
    <textarea id="firma" placeholder="Firma (nombre o firma digital)"
              style="width:300px; height:60px;"></textarea>
</div>

<br>

<button onclick="imprimir()">🖨️ Imprimir</button>

<script>
function imprimir() {
    const recibe = document.getElementById("recibe").value;
    const firma = document.getElementById("firma").value;

    if (!recibe) {
        alert("Debes ingresar quién recibe");
        return;
    }

    // reemplazar inputs por texto antes de imprimir
    document.getElementById("recibe").outerHTML =
        "<p><b>Recibe:</b> " + recibe + "</p>";

    document.getElementById("firma").outerHTML =
        "<p><b>Firma:</b> " + firma + "</p>";

    window.print();
}
</script>

</body>
</html>
