<!DOCTYPE html>
<html>
<head>
    <title>Aranet Live Data</title>
</head>
<body>
    <h1>Datos de sensores Aranet</h1>
    <ul id="sensor-data"></ul>

    <script>
        const evtSource = new EventSource("https://sdc-iot.popoyan.com.gt/iotappweb/aranet-stream/");
        evtSource.onmessage = function(e) {
            const ul = document.getElementById("sensor-data");
            const li = document.createElement("li");
            li.textContent = e.data;  // JSON completo que llega
            ul.appendChild(li);
        };
        evtSource.onerror = function(e) {
            console.error("EventSource error:", e);
        };
    </script>
</body>
</html>
