<!DOCTYPE html>
<html>
<head>
    <title>Aranet Live Data</title>
</head>
<body>
    <h1>Datos de sensores Aranet</h1>
    <ul id="sensor-data"></ul>

    <script>
        const evtSource = new EventSource("/aranet-stream/"); // Creamos la ruta SSE
        evtSource.onmessage = function(e) {
            console.log("Datos recibidos:", e.data);
            const ul = document.getElementById("sensor-data");
            const li = document.createElement("li");
            li.textContent = e.data;
            ul.appendChild(li);
        };
    </script>
</body>
</html>
