<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Lecturas Aranet</title>
</head>
<body>
<h1>Lecturas Aranet</h1>
<table border="1" id="aranet-table">
  <tr>
    <th>Sensor</th>
    <th>Timestamp</th>
    <th>CO2</th>
    <th>Temperature</th>
    <th>Humidity</th>
  </tr>
  {% for r in readings %}
  <tr>
    <td>{{ r.sensor }}</td>
    <td>{{ r.timestamp }}</td>
    <td>{{ r.co2 }}</td>
    <td>{{ r.temperature }}</td>
    <td>{{ r.humidity }}</td>
  </tr>
  {% endfor %}
</table>

<script>
function fetchData() {
  fetch('/iotappweb/aranet-data-json/')
    .then(res => res.json())
    .then(data => {
      const table = document.getElementById('aranet-table');
      
      // Borra todas las filas excepto la cabecera
      table.querySelectorAll('tr:not(:first-child)').forEach(tr => tr.remove());
      
      // Añade nuevas filas
      data.forEach(r => {
        const row = table.insertRow();
        row.insertCell(0).textContent = r.sensor;
        row.insertCell(1).textContent = r.timestamp;
        row.insertCell(2).textContent = r.co2;
        row.insertCell(3).textContent = r.temperature;
        row.insertCell(4).textContent = r.humidity;
      });
    })
    .catch(err => console.error("Error:", err));
}

// Llamar cada 2 segundos
setInterval(fetchData, 2000);
</script>
</body>
</html>
