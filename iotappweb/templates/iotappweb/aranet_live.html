<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Lecturas Aranet</title>
  <style>
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid black; padding: 4px; text-align: center; }
  </style>
</head>
<body>
<h1>Lecturas Aranet en vivo</h1>
<table id="aranet-table">
  <tr>
    <th>Sensor</th>
    <th>Timestamp</th>
    <th>Métrica</th>
    <th>Valor</th>
    <th>Unidad</th>
  </tr>
  {% for r in readings %}
  <tr>
    <td>{{ r.sensor }}</td>
    <td>{{ r.timestamp }}</td>
    <td>{{ r.metric }}</td>
    <td>{{ r.value }}</td>
    <td>{{ r.unit }}</td>
  </tr>
  {% endfor %}
</table>

<script>
// Función que consulta el JSON y actualiza la tabla
function fetchData() {
    fetch('/iotappweb/aranet-data-json/')
        .then(res => res.json())
        .then(data => {
            const table = document.getElementById('aranet-table');
            // Borra todas las filas excepto la cabecera
            table.querySelectorAll('tr:not(:first-child)').forEach(tr => tr.remove());

            // Inserta filas nuevas
            data.forEach(r => {
                const row = table.insertRow();
                row.insertCell(0).textContent = r.sensor;
                row.insertCell(1).textContent = r.timestamp;
                row.insertCell(2).textContent = r.metric;
                row.insertCell(3).textContent = r.value;
                row.insertCell(4).textContent = r.unit;
            });
        })
        .catch(err => console.error("Error:", err));
}

// Actualiza cada 2 segundos
setInterval(fetchData, 2000);
</script>
</body>
</html>
