<h1>Lecturas Aranet</h1>
<table border="1">
  <tr>
    <th>Sensor</th>
    <th>Timestamp</th>
    <th>CO2</th>
    <th>Temperature</th>
    <th>Humidity</th>
  </tr>
  {% for r in readings %}
  <tr>
    <td>{{ r.sensor }}</td>
    <td>{{ r.timestamp }}</td>
    <td>{{ r.co2 }}</td>
    <td>{{ r.temperature }}</td>
    <td>{{ r.humidity }}</td>
  </tr>
  {% endfor %}
</table>
