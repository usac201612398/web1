<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Lecturas Aranet</title>
</head>
<body>
<h1>Lecturas Aranet</h1>
<table border="1" id="aranet-table">
  <tr>
    <th>Sensor</th>
    <th>Timestamp</th>
    <th>CO2</th>
    <th>Temperature</th>
    <th>Humidity</th>
  </tr>
  {% for r in readings %}
  <tr>
    <td>{{ r.sensor }}</td>
    <td>{{ r.timestamp }}</td>
    <td>{{ r.co2 }}</td>
    <td>{{ r.temperature }}</td>
    <td>{{ r.humidity }}</td>
  </tr>
  {% endfor %}
</table>

<script>
const socket = new WebSocket("wss://sdc-iot.popoyan.com.gt/ws/sensor_data/");
socket.onopen = function() {
    console.log("✅ WebSocket conectado");
};

socket.onerror = function(error) {
    console.error("❌ WebSocket error:", error);
};
socket.onmessage = function(event) {
    const data = JSON.parse(event.data);
    console.log("📡 SENSOR EN VIVO:", data);

    const table = document.getElementById('aranet-table');

    // Insertar nueva fila arriba (debajo del header)
    const row = table.insertRow(1);

    row.insertCell(0).textContent = data.sensor;
    row.insertCell(1).textContent = data.timestamp;

    // Ajusta según tu métrica
    row.insertCell(2).textContent = data.metric === "co2" ? data.value : "-";
    row.insertCell(3).textContent = data.metric === "temperature" ? data.value : "-";
    row.insertCell(4).textContent = data.metric === "humidity" ? data.value : "-";
};
</script>
</body>
</html>
