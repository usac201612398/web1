<!DOCTYPE html>
<html>
<head>
    <title>Aranet Live Data</title>
</head>
<body>
<h1>Datos de sensores Aranet (SendML)</h1>
<pre id="data"></pre>

<script>
const evtSource = new EventSource("/iotappweb/aranet-stream/");

evtSource.onmessage = function(event) {
    const data = JSON.parse(event.data);
    console.log("Datos recibidos:", data);
    document.getElementById("data").textContent = JSON.stringify(data, null, 2);
};
</script>
</body>
</html>
