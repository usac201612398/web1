<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Dashboard Riego Aranet</title>

    <!-- Luxon -->
    <script src="https://cdn.jsdelivr.net/npm/luxon@3.4.0/build/global/luxon.min.js"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <!-- Adapter -->
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.1.0"></script>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">

    <style>
        body {
            padding: 20px;
            background: #f5f6fa;
        }

        .card {
            border-radius: 10px;
        }

        .chart-box {
            height: 300px;
        }

        .filters {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .sensor-list {
            max-height: 120px;
            overflow: auto;
            font-size: 12px;
        }

        .valley-dot {
            width: 8px;
            height: 8px;
            background: red;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }
    </style>
</head>

<body>

    <h2>🌱 Dashboard de Riego</h2>

    <!-- FILTROS -->
    <div class="filters">
        <div class="row g-3">

            <div class="col-md-2">
                <label>Tiempo</label>
                <select id="time-filter" class="form-select">
                    <option value="1">1h</option>
                    <option value="6">6h</option>
                    <option value="12">12h</option>
                    <option value="24" selected>24h</option>
                </select>
            </div>

            <div class="col-md-3">
                <label>Finca</label>
                <select id="finca-filter" class="form-select"></select>
            </div>

            <div class="col-md-3">
                <label>Priva</label>
                <select id="priva-filter" class="form-select"></select>
            </div>

            <div class="col-md-4">
                <label>Sensores</label>
                <div id="sensor-filters" class="sensor-list"></div>
            </div>

        </div>
    </div>

    <!-- CONTADOR -->
    <div class="card p-3 mb-3">
        <h5>🔴 Riegos detectados (valles)</h5>
        <div id="valley-counters"></div>
    </div>

    <!-- GRAFICAS -->
    <div class="row" id="charts-container"></div>

    <!-- MODAL -->
    <div class="modal fade" id="modalValle">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5>Detalle de Riegos</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="modal-body"></div>
            </div>
        </div>
    </div>

    <script>
        let allData = [];
        let charts = [];

        async function fetchData() {
            const res = await fetch('/iotappweb/aranet-curvas-json/');
            allData = await res.json();
            console.log('Datos cargados:', allData);
            initFilters();
            renderCharts();
        }

        function initFilters() {
            const fincaSel = document.getElementById('finca-filter');
            const privaSel = document.getElementById('priva-filter');

            const fincas = [...new Set(allData.map(d => d.finca).filter(f => f))];
            const privas = [...new Set(allData.map(d => d.priva).filter(p => p))];

            fincaSel.innerHTML = '<option value="">Todas</option>' + fincas.map(f => '<option value="' + f + '">' + f + '</option>').join('');
            privaSel.innerHTML = '<option value="">Todas</option>' + privas.map(p => '<option value="' + p + '">' + p + '</option>').join('');

            const cont = document.getElementById('sensor-filters');
            cont.innerHTML = '';

            const sensoresOrdenados = [...allData].sort((a, b) => {
                if (a.estructura === b.estructura) {
                    return (a.nombre || a.sensor).localeCompare(b.nombre || b.sensor);
                }
                return (a.estructura || '').localeCompare(b.estructura || '');
            });

            sensoresOrdenados.forEach((d, i) => {
                cont.innerHTML += `
                <div>
                    <input type="checkbox" value="${d.sensor}" id="sensor_${i}" checked onchange="renderCharts()">
                    <label for="sensor_${i}">
                        <strong>${d.estructura || 'Sin estructura'}</strong> - ${d.nombre || d.sensor}
                    </label>
                </div>
            `;
            });

            fincaSel.onchange = function () {
                const fincaSeleccionada = fincaSel.value;
                if (fincaSeleccionada) {
                    const privasDisponibles = [...new Set(allData
                        .filter(function (d) { return d.finca === fincaSeleccionada; })
                        .map(function (d) { return d.priva; })
                        .filter(function (p) { return p; }))];
                    privaSel.innerHTML = '<option value="">Todas</option>' +
                        privasDisponibles.map(function (p) { return '<option value="' + p + '">' + p + '</option>'; }).join('');
                } else {
                    privaSel.innerHTML = '<option value="">Todas</option>' +
                        privas.map(function (p) { return '<option value="' + p + '">' + p + '</option>'; }).join('');
                }
                renderCharts();
            };

            privaSel.onchange = renderCharts;
            document.getElementById('time-filter').onchange = renderCharts;
        }

        function filterTime(readings) {
            const h = document.getElementById('time-filter').value;
            const now = new Date();
            const horas = parseInt(h);
            return readings.filter(function (r) {
                return (now - new Date(r.timestamp)) <= horas * 3600000;
            });
        }

        function getValleys(data) {
            let valleys = [];
            for (let i = 1; i < data.length - 1; i++) {
                if (data[i].y < data[i - 1].y && data[i].y < data[i + 1].y) {
                    valleys.push(data[i]);
                }
            }
            return valleys;
        }

        function showModal(sensor, valleys) {
            let html = '<h6>Sensor: ' + sensor + '</h6>';
            html += '<b>Riegos detectados:</b><ul>';

            valleys.forEach(function (v) {
                html += '<li>' + new Date(v.x).toLocaleString() + '</li>';
            });

            if (valleys.length === 0) {
                html += '<li>No se detectaron riegos</li>';
            }

            html += '</ul>';

            if (valleys.length > 1) {
                html += '<b>Intervalos entre riegos (min):</b><ul>';
                for (let i = 1; i < valleys.length; i++) {
                    let diff = (new Date(valleys[i].x) - new Date(valleys[i - 1].x)) / 60000;
                    html += '<li>' + diff.toFixed(1) + ' min</li>';
                }
                html += '</ul>';
            }

            document.getElementById('modal-body').innerHTML = html;
            new bootstrap.Modal(document.getElementById('modalValle')).show();
        }

        function renderCharts() {
            charts.forEach(function (c) {
                if (c && typeof c.destroy === 'function') {
                    c.destroy();
                }
            });
            charts = [];

            const finca = document.getElementById('finca-filter').value;
            const priva = document.getElementById('priva-filter').value;
            const horasFiltro = document.getElementById('time-filter').value;

            const selectedSensors = Array.from(document.querySelectorAll('#sensor-filters input:checked'))
                .map(function (cb) { return cb.value; });

            console.log('Sensores seleccionados:', selectedSensors);

            let data = allData.filter(function (d) {
                return selectedSensors.includes(d.sensor);
            });
            data = data.filter(function (d) {
                return !finca || d.finca === finca;
            });
            data = data.filter(function (d) {
                return !priva || d.priva === priva;
            });

            console.log('Datos después de filtros:', data.length);

            if (data.length === 0) {
                const container = document.getElementById('charts-container');
                container.innerHTML = '<div class="alert alert-warning">No hay datos para los filtros seleccionados</div>';
                document.getElementById('valley-counters').innerHTML = '';
                return;
            }

            const grupos = {};
            data.forEach(function (d) {
                const estructura = d.estructura || 'Sin estructura';
                if (!grupos[estructura]) grupos[estructura] = [];
                grupos[estructura].push(d);
            });

            console.log('Estructuras encontradas:', Object.keys(grupos));

            const container = document.getElementById('charts-container');
            container.innerHTML = '';

            const valleyContainer = document.getElementById('valley-counters');
            valleyContainer.innerHTML = '<h6>📊 Resumen de riegos por sensor:</h6>';

            let graficosCreados = 0;
            const estructurasOrdenadas = Object.keys(grupos).sort();

            for (let idx = 0; idx < estructurasOrdenadas.length; idx++) {
                const estructura = estructurasOrdenadas[idx];
                const sensoresEnEstructura = grupos[estructura];
                console.log('Estructura ' + estructura + ': ' + sensoresEnEstructura.length + ' sensores');

                const canvasId = 'chart_' + estructura.replace(/\s+/g, '_') + '_' + idx;

                container.innerHTML += `
                <div class="col-md-6 mb-3">
                    <div class="card p-2">
                        <h6>📈 ${estructura} (${sensoresEnEstructura.length} sensor/es)</h6>
                        <canvas id="${canvasId}" style="height: 300px; width: 100%;"></canvas>
                    </div>
                </div>
            `;

                const datasets = [];

                for (let s = 0; s < sensoresEnEstructura.length; s++) {
                    const d = sensoresEnEstructura[s];
                    const filteredReadings = filterTime(d.readings);

                    if (filteredReadings.length === 0) {
                        console.log('Sensor ' + (d.nombre || d.sensor) + ' sin datos en el rango de ' + horasFiltro + 'h');
                        continue;
                    }

                    const dataPoints = filteredReadings.map(function (r) {
                        return {
                            x: new Date(r.timestamp),
                            y: r.value
                        };
                    });

                    const valleys = getValleys(dataPoints);

                    valleyContainer.innerHTML += `
                    <div class="mb-1">
                        <span class="valley-dot"></span>
                        <strong>${estructura}</strong> - ${d.nombre || d.sensor}: 
                        <span class="badge bg-danger">${valleys.length} riegos</span>
                        <button class="btn btn-sm btn-outline-primary ms-2"
                            onclick='showModal("${(d.nombre || d.sensor).replace(/'/g, "\\'")}", ${JSON.stringify(valleys)})'>
                            📋 detalles
                        </button>
                    </div>
                `;

                    const pointColors = dataPoints.map(function (p) {
                        return valleys.some(function (v) {
                            return v.x.getTime() === p.x.getTime();
                        }) ? 'red' : '#36A2EB';
                    });

                    const hue = (datasets.length * 137.5) % 360;

                    datasets.push({
                        label: d.nombre || d.sensor,
                        data: dataPoints,
                        borderColor: 'hsl(' + hue + ', 70%, 50%)',
                        backgroundColor: 'hsl(' + hue + ', 70%, 50%, 0.1)',
                        tension: 0.3,
                        pointRadius: 4,
                        pointHoverRadius: 6,
                        pointBackgroundColor: pointColors,
                        pointBorderColor: pointColors.map(function (c) { return c === 'red' ? 'darkred' : 'darkblue'; }),
                        fill: false
                    });
                }

                if (datasets.length === 0) {
                    console.log('No hay datasets para estructura ' + estructura);
                    continue;
                }

                const canvas = document.getElementById(canvasId);
                if (!canvas) {
                    console.error('Canvas ' + canvasId + ' no encontrado');
                    continue;
                }

                const ctx = canvas.getContext('2d');

                const chart = new Chart(ctx, {
                    type: 'line',
                    data: { datasets: datasets },
                    options: {
                        responsive: true,
                        maintainAspectRatio: true,
                        plugins: {
                            legend: {
                                display: true,
                                position: 'top',
                                labels: { font: { size: 11 } }
                            },
                            tooltip: {
                                mode: 'index',
                                intersect: false
                            }
                        },
                        scales: {
                            x: {
                                type: 'time',
                                time: {
                                    tooltipFormat: 'dd/MM/yyyy HH:mm',
                                    displayFormats: {
                                        hour: 'HH:mm',
                                        minute: 'HH:mm'
                                    }
                                },
                                title: { display: true, text: 'Fecha/Hora' }
                            },
                            y: {
                                title: { display: true, text: 'Peso (kg)' },
                                beginAtZero: false
                            }
                        },
                        interaction: {
                            mode: 'nearest',
                            axis: 'x',
                            intersect: false
                        }
                    }
                });

                charts.push(chart);
                graficosCreados++;
            }

            if (graficosCreados === 0) {
                container.innerHTML = '<div class="alert alert-info">No hay datos para mostrar en el rango seleccionado</div>';
            }

            console.log('Total de gráficos creados: ' + graficosCreados);
        }

        fetchData();
    </script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
