<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Curvas Aranet Pro</title>

<script src="https://cdn.jsdelivr.net/npm/luxon@3.4.0/build/global/luxon.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.1.0/dist/chartjs-adapter-luxon.min.js"></script>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">

<style>
body { padding:20px; }
.chart-box { height:300px; margin-bottom:20px; }
.filter-bar {
    background:#f8f9fa;
    padding:10px;
    border-radius:8px;
    margin-bottom:15px;
}
</style>
</head>

<body>

<h2>📊 Curvas de Riego Aranet</h2>

<div class="filter-bar">
    <label>Rango:</label>
    <select id="range" class="form-select d-inline-block" style="width:150px;">
        <option value="1h">Última 1h</option>
        <option value="6h">Últimas 6h</option>
        <option value="24h">Últimas 24h</option>
    </select>

    <button class="btn btn-primary btn-sm ms-2" onclick="fetchData()">Actualizar</button>
</div>

<div class="row">
    <div class="col-md-6"><canvas id="chart1" class="chart-box"></canvas></div>
    <div class="col-md-6"><canvas id="chart2" class="chart-box"></canvas></div>
    <div class="col-md-6"><canvas id="chart3" class="chart-box"></canvas></div>
    <div class="col-md-6"><canvas id="chart4" class="chart-box"></canvas></div>
</div>

<script>
let charts = [];

async function fetchData(){
    const range = document.getElementById('range').value;

    const res = await fetch(`/iotappweb/aranet-curvas-json/?range=${range}`);
    const data = await res.json();

    renderCharts(data);
}

function splitData(data){
    const groups = [[],[],[],[]];

    data.forEach((d,i)=>{
        groups[i % 4].push(d);
    });

    return groups;
}

function createDataset(sensor){
    const dataPoints = sensor.readings.map(r => ({
        x: new Date(r.timestamp),
        y: r.value
    }));

    return {
        label: sensor.sensor,
        data: dataPoints,
        borderColor: randomColor(),
        tension:0.3
    };
}

function renderCharts(data){
    // destruir anteriores
    charts.forEach(c => c.destroy());
    charts = [];

    const groups = splitData(data);
    const canvasIds = ['chart1','chart2','chart3','chart4'];

    groups.forEach((group, index)=>{
        const ctx = document.getElementById(canvasIds[index]);

        const datasets = group.map(createDataset);

        const chart = new Chart(ctx, {
            type:'line',
            data:{datasets},
            options:{
                responsive:true,
                plugins:{legend:{position:'bottom'}},
                scales:{
                    x:{type:'time'},
                    y:{title:{display:true,text:'Peso'}}
                }
            }
        });

        charts.push(chart);
    });
}

function randomColor(){
    return `rgb(${Math.random()*200},${Math.random()*200},${Math.random()*200})`;
}

fetchData();
</script>

</body>
</html>
