<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Curvas Avanzadas de Sensores Aranet</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .controls { margin-bottom: 15px; }
        .controls label { margin-right: 10px; }
        canvas { max-width: 100%; height: 400px; }
    </style>
</head>
<body>

<h1>Curvas Avanzadas de Sensores Aranet</h1>

<div class="controls">
    <label>Sensores:</label>
    <select id="sensorSelect" multiple>
        <!-- JS llenará con sensores -->
    </select>

    <label>Intervalo:</label>
    <select id="intervalSelect">
        <option value="1h">Última 1h</option>
        <option value="6h">Últimas 6h</option>
        <option value="24h">Últimas 24h</option>
    </select>

    <label>
        <input type="checkbox" id="smooth"> Suavizar (promedio móvil)
    </label>
</div>

<canvas id="sensorChart"></canvas>

<script>
let chart; 

async function fetchData() {
    const res = await fetch('/iotappweb/aranet-resumen-json/');
    const data = await res.json();
    return data;
}

function smoothArray(arr, windowSize = 3) {
    let result = [];
    for (let i = 0; i < arr.length; i++) {
        let start = Math.max(0, i - Math.floor(windowSize/2));
        let end = Math.min(arr.length, i + Math.floor(windowSize/2) + 1);
        let avg = arr.slice(start, end).reduce((a,b)=>a+b,0)/(end-start);
        result.push(avg);
    }
    return result;
}

async function updateChart() {
    const data = await fetchData();
    const selectedSensors = Array.from(document.getElementById('sensorSelect').selectedOptions).map(o => o.value);
    const smooth = document.getElementById('smooth').checked;

    if (!selectedSensors.length) return;

    const labels = [...new Set(data.flatMap(d => d.readings.map(r => r.timestamp)))].sort();
    const datasets = selectedSensors.map(sensor => {
        const sensorData = data.find(d => d.sensor === sensor);
        if (!sensorData) return null;
        let values = sensorData.readings.map(r => r.value);
        if (smooth) values = smoothArray(values);
        return {
            label: sensor,
            data: values,
            fill: false,
            borderColor: `hsl(${Math.random()*360},70%,50%)`,
            tension: 0.2
        };
    }).filter(Boolean);

    if (!chart) {
        const ctx = document.getElementById('sensorChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'line',
            data: { labels, datasets },
            options: { responsive: true, interaction: { mode: 'nearest', intersect: false }, scales: { x: { display: true }, y: { display: true } } }
        });
    } else {
        chart.data.labels = labels;
        chart.data.datasets = datasets;
        chart.update();
    }
}

async function populateSensors() {
    const data = await fetchData();
    const select = document.getElementById('sensorSelect');
    data.forEach(d => {
        const option = document.createElement('option');
        option.value = d.sensor;
        option.textContent = d.sensor;
        select.appendChild(option);
    });
}

// Inicialización
populateSensors();
document.getElementById('sensorSelect').addEventListener('change', updateChart);
document.getElementById('intervalSelect').addEventListener('change', updateChart);
document.getElementById('smooth').addEventListener('change', updateChart);

setInterval(updateChart, 15000); // refresco cada minuto
</script>

</body>
</html>
