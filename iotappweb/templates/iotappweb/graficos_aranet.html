<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Curvas de Peso y Picos de Riego - Aranet</title>

    <!-- Moment.js -->
    <script src="https://cdn.jsdelivr.net/npm/moment@2.29.4/moment.min.js"></script>
    <!-- Chart.js Time Adapter -->
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-moment@1.1.0/dist/chartjs-adapter-moment.min.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">

    <style>
        body { padding: 20px; }
        #chart-container { width: 100%; height: 500px; margin-top: 20px; }
        .filter-section { margin-bottom: 20px; }
        .sensor-checkbox { margin-right: 15px; }
        .peak-dot { background-color: red; border-radius: 50%; width: 6px; height: 6px; display: inline-block; margin-right: 5px; }
    </style>
</head>

<body>
    <h1>Curvas de Peso y Picos de Riego - Aranet</h1>

    <!-- Filtros de sensores -->
    <div class="filter-section">
        <label>Filtrar sensores:</label><br>
        <div id="sensor-filters"></div>
    </div>

    <!-- Filtros por finca, priva y estructura -->
    <div class="filter-section">
        <label>Finca:</label>
        <select id="finca-filter" class="form-select" style="width:200px; display:inline-block;">
            <option value="">Todas</option>
        </select>

        <label style="margin-left:15px;">Priva:</label>
        <select id="priva-filter" class="form-select" style="width:200px; display:inline-block;">
            <option value="">Todas</option>
        </select>

        <label style="margin-left:15px;">Estructura:</label>
        <select id="estructura-filter" class="form-select" style="width:200px; display:inline-block;">
            <option value="">Todas</option>
        </select>
    </div>

    <!-- Contador de picos -->
    <div class="filter-section">
        <strong>Contador de picos (riego activado):</strong>
        <div id="peak-counters"></div>
    </div>

    <!-- Gráfica -->
    <div id="chart-container">
        <canvas id="sensorChart"></canvas>
    </div>

    <script>
        let allData = [];
        let chart;

        // Obtener datos JSON del backend
        async function fetchData() {
            try {
                const res = await fetch('/iotappweb/aranet-curvas-json/');
                allData = await res.json();
                renderFilters();
                updateChart();
            } catch (err) {
                console.error("Error fetching data:", err);
            }
        }

        // Renderizar filtros dinámicamente
        function renderFilters() {
            const sensorContainer = document.getElementById('sensor-filters');
            sensorContainer.innerHTML = '';
            const fincaSelect = document.getElementById('finca-filter');
            const privaSelect = document.getElementById('priva-filter');
            const estructuraSelect = document.getElementById('estructura-filter');

            const fincas = new Set(), privas = new Set(), estructuras = new Set();
            allData.forEach(d => { fincas.add(d.finca); privas.add(d.priva); estructuras.add(d.estructura); });

            fincaSelect.innerHTML = '<option value="">Todas</option>' + [...fincas].map(f => `<option value="${f}">${f}</option>`).join('');
            privaSelect.innerHTML = '<option value="">Todas</option>' + [...privas].map(p => `<option value="${p}">${p}</option>`).join('');
            estructuraSelect.innerHTML = '<option value="">Todas</option>' + [...estructuras].map(e => `<option value="${e}">${e}</option>`).join('');

            // Checkboxes para cada sensor
            allData.forEach(d => {
                const cb = document.createElement('input');
                cb.type = 'checkbox';
                cb.checked = true;
                cb.className = 'sensor-checkbox';
                cb.value = d.sensor;
                cb.id = `sensor-${d.sensor}`;
                cb.onchange = updateChart;

                const label = document.createElement('label');
                label.htmlFor = cb.id;
                label.innerText = `${d.sensor} (${d.finca}/${d.priva}/${d.estructura})`;
                label.style.marginRight = '15px';

                sensorContainer.appendChild(cb);
                sensorContainer.appendChild(label);
            });

            fincaSelect.onchange = updateChart;
            privaSelect.onchange = updateChart;
            estructuraSelect.onchange = updateChart;
        }

        // Contar picos en un arreglo de datos
        function countPeaks(dataPoints) {
            let count = 0;
            for (let i = 1; i < dataPoints.length - 1; i++) {
                if (dataPoints[i].y > dataPoints[i - 1].y && dataPoints[i].y > dataPoints[i + 1].y) {
                    count++;
                    dataPoints[i].peak = true;
                } else {
                    dataPoints[i].peak = false;
                }
            }
            return count;
        }

        // Actualizar contador de picos en el DOM
        function updatePeakCounters(datasets) {
            const container = document.getElementById('peak-counters');
            container.innerHTML = '';
            datasets.forEach(ds => {
                const peakCount = ds.data.filter(p => p.peak).length;
                const div = document.createElement('div');
                div.innerHTML = `<span class="peak-dot"></span> ${ds.label}: ${peakCount} picos`;
                container.appendChild(div);
            });
        }

        // Actualizar la gráfica
        function updateChart() {
            const selectedSensors = Array.from(document.querySelectorAll('.sensor-checkbox'))
                .filter(cb => cb.checked).map(cb => cb.value);

            const fincaFilter = document.getElementById('finca-filter').value;
            const privaFilter = document.getElementById('priva-filter').value;
            const estructuraFilter = document.getElementById('estructura-filter').value;

            const datasets = allData
                .filter(d => selectedSensors.includes(d.sensor))
                .filter(d => !fincaFilter || d.finca === fincaFilter)
                .filter(d => !privaFilter || d.priva === privaFilter)
                .filter(d => !estructuraFilter || d.estructura === estructuraFilter)
                .map(d => {
                    const dataPoints = d.readings.map(r => ({ x: r.timestamp, y: r.value }));
                    countPeaks(dataPoints); // marca los picos
                    return {
                        label: `${d.sensor} (${d.finca}/${d.priva}/${d.estructura})`,
                        data: dataPoints,
                        borderColor: getRandomColor(),
                        fill: false,
                        tension: 0.2,
                        pointRadius: 3,
                        pointBackgroundColor: dataPoints.map(p => p.peak ? 'red' : 'blue')
                    };
                });

            updatePeakCounters(datasets);

            const ctx = document.getElementById('sensorChart').getContext('2d');
            if (chart) chart.destroy();

            chart = new Chart(ctx, {
                type: 'line',
                data: { datasets },
                options: {
                    responsive: true,
                    interaction: { mode: 'nearest', axis: 'x', intersect: false },
                    plugins: {
                        tooltip: { mode: 'index', intersect: false },
                        legend: { display: true, position: 'bottom' }
                    },
                    scales: {
                        x: {
                            type: 'time',
                            time: { parser: 'YYYY-MM-DD HH:mm:ss', tooltipFormat: 'DD MMM HH:mm' },
                            title: { display: true, text: 'Timestamp' }
                        },
                        y: { title: { display: true, text: 'Peso (kg)' } }
                    }
                }
            });
        }

        // Generar color aleatorio
        function getRandomColor() {
            const r = Math.floor(Math.random() * 200);
            const g = Math.floor(Math.random() * 200);
            const b = Math.floor(Math.random() * 200);
            return `rgb(${r},${g},${b})`;
        }

        fetchData();
    </script>
</body>

</html>
