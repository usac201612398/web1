<!DOCTYPE html>
<html>
{% load static %}
<head>
    <meta charset="UTF-8">
    <title>Resumen de Riego</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/jquery.dataTables.min.css">

    <style>
        td, th {
            white-space: nowrap;
            text-align: center;
        }

        .ok { background-color: #c8f7c5 !important; }
        .warning { background-color: #fff3cd !important; }
        .danger { background-color: #f8d7da !important; }
    </style>
</head>

<body>
<div class="container mt-4">
    <h1>🌱 Resumen de Riego (Peso)</h1>

    <table id="resumen-table" class="table table-striped display nowrap">
        <thead>
            <tr>
                <th>Finca</th>
                <th>Priva</th>
                <th>Estructura</th>
                <th>Sensor</th>
                <th>Peso actual</th>
                <th>Peso base</th>
                <th>% Restante</th>
                <th>% Pérdida</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>

<script>
let table;

function getClass(p) {
    if (p > 10) return "danger";
    if (p > 5) return "warning";
    return "ok";
}

function safe(v) {
    return (v === null || v === undefined) ? "-" : v;
}

function fetchData() {
    fetch('/iotappweb/aranet-resumen-json/')
        .then(r => r.json())
        .then(data => {

            table.clear();

            data.forEach(r => {

                const perdida = parseFloat(r.porcentaje_perdida || 0);

                table.row.add([
                    safe(r.finca),
                    safe(r.priva),
                    safe(r.estructura),
                    safe(r.sensor),
                    safe(r.peso_actual),
                    safe(r.peso_base),
                    (r.porcentaje_restante ?? 0) + " %",
                    perdida + " %"
                ]).nodes().to$().addClass(getClass(perdida));
            });

            table.draw();
        });
}

$(document).ready(function () {

    table = $('#resumen-table').DataTable({
        scrollX: true,
        paging: false,
        info: false
    });

    fetchData();
    setInterval(fetchData, 15000);
});
</script>

</body>
</html>
