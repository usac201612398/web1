<!DOCTYPE html>
<html>
{% load static %}
<head>
    <meta charset="UTF-8">
    <title>Resumen de Sensores</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bulma/0.9.4/css/bulma.min.css">

    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/jquery.dataTables.min.css">

    <style>
        td, th {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
            text-align: center;
        }

        .ok { background-color: #c8f7c5 !important; }
        .warning { background-color: #fff3cd !important; }
        .danger { background-color: #f8d7da !important; }

        .table-container {
            overflow-x: auto;
        }
    </style>
</head>

<body>
<div class="container mt-4">
    <h1 class="mb-3">🌱 Resumen de Sensores (Riego)</h1>

    <div class="table-container">
        <table id="resumen-table" class="table table-striped table-hover display nowrap">
            <thead>
                <tr>
                    <th>Finca</th>
                    <th>Priva</th>
                    <th>Estructura</th>
                    <th>Sensor</th>
                    <th>Peso actual (kg)</th>
                    <th>Peso base (kg)</th>
                    <th>% Restante</th>
                    <th>% Pérdida</th>
                    <th>Temp (°C)</th>
                    <th>Humedad (%)</th>
                    <th>DH</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<!-- Scripts -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>

<script>
let table;

function getRowClass(perdida) {
    if (perdida > 10) return "danger";
    if (perdida > 5) return "warning";
    return "ok";
}

// 🔥 función segura para evitar undefined/null
function safe(v, fallback = "-") {
    return (v === null || v === undefined || v === "") ? fallback : v;
}

function fetchResumen() {
    fetch('/iotappweb/aranet-resumen-json/')
        .then(res => res.json())
        .then(data => {

            table.clear();

            data.forEach(r => {

                const perdida = parseFloat(r.porcentaje_perdida ?? 0);

                const row = [
                    safe(r.finca),
                    safe(r.priva),
                    safe(r.estructura),
                    safe(r.sensor),
                    safe(r.peso_actual, 0),
                    safe(r.peso_base, 0),
                    (r.porcentaje_restante ?? 0) + " %",
                    perdida + " %",
                    safe(r.temperatura),
                    safe(r.humedad),
                    safe(r.dh)
                ];

                table.row
                    .add(row)
                    .nodes()
                    .to$()
                    .addClass(getRowClass(perdida));
            });

            table.draw();
        })
        .catch(err => console.error("Error:", err));
}

$(document).ready(function () {

    table = $('#resumen-table').DataTable({
        scrollX: true,
        autoWidth: false,
        paging: false,
        info: false,
        destroy: true   // 🔥 evita conflictos si recarga
    });

    fetchResumen();
    setInterval(fetchResumen, 15000);
});
</script>

</body>
</html>
