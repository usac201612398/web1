<!DOCTYPE html>
<html>
{% load static %}
<head>
    <meta charset="UTF-8">
    <title>Resumen de Sensores</title>

    <!-- Bootstrap + Bulma -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">

    <!-- DataTables -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/jquery.dataTables.min.css">

    <style>
        td, th {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
            text-align: center;
        }

        .ok { background-color: #c8f7c5 !important; }       /* verde */
        .warning { background-color: #fff3cd !important; }  /* amarillo */
        .danger { background-color: #f8d7da !important; }   /* rojo */

        .table-container {
            overflow-x: auto;
        }
    </style>
</head>

<body>
<div class="container mt-4">
    <h1 class="mb-3">🌱 Resumen de Sensores (Riego)</h1>
    <div class="table-container">
        <table id="resumen-table" class="table table-striped table-hover display nowrap">
            <thead>
                <tr>
                    <th>Finca</th>
                    <th>Priva</th>
                    <th>Estructura</th>
                    <th>Sensor</th>
                    <th>Peso actual (kg)</th>
                    <th>Peso base (kg)</th>
                    <th>% Restante</th>
                    <th>% Pérdida</th>
                    <th>% Crítico</th>
                </tr>
            </thead>
            <tbody>
                <!-- Se llenará con JS -->
            </tbody>
        </table>
    </div>
</div>

<!-- Scripts -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>

<script>
function getRowClass(perdida) {
    if (perdida > 10) return "danger";   // 🔴 alerta
    if (perdida > 4) return "warning";  // 🟡 leve
    return "ok";                        // 🟢 normal
}

function fetchResumen() {
    fetch('/iotappweb/aranet-resumen-json/')
        .then(res => res.json())
        .then(data => {
            const table = $('#resumen-table').DataTable();

            table.clear(); // limpiar filas existentes

            data.forEach(r => {
                table.row.add([
                    r.finca,
                    r.priva,
                    r.estructura,
                    r.sensor,
                    r.peso_actual,
                    r.peso_base,
                    r.porcentaje_restante + " %",
                    r.porcentaje_perdida + " %",
                    r.porcentaje_critico + " %"
                ]).nodes().to$().addClass(getRowClass(r.porcentaje_perdida));
            });

            table.draw();
        })
        .catch(err => console.error("Error:", err));
}

$(document).ready(function () {
    $('#resumen-table').DataTable({
        scrollX: true,
        autoWidth: false,
        paging: false,       // sin paginación
        info: false          // sin info de filas
    });

    fetchResumen();              // carga inicial
    setInterval(fetchResumen, 15000); // actualización cada minuto
});
</script>

</body>
</html>
